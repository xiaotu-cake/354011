        /* 基础样式和背景过渡效果 */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fdf6e3, #e0f7fa);
            background-size: 400% 400%;
            transition: background 1s ease-in-out;
        }

        /* 卷轴外部的容器 */
        #scroll-container {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 卷轴的上下两根“木轴” */
        .scroll-roller {
            width: 340px;
            height: 20px;
            background: #8b5a2b;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10; /* 木轴要在最上层 */
        }

        /* 卷轴的纸张部分 */
        #scroll-paper {
            width: 300px;
            max-height: 0; 
            overflow: hidden;
            background-color: #fff9e6;
            border-left: 2px solid #deb887;
            border-right: 2px solid #deb887;
            box-shadow: inset 0 0 20px rgba(222, 184, 135, 0.5);
            transition: max-height 1.2s cubic-bezier(0.25, 1, 0.5, 1); 
            position: relative; /* 为了让烟雾能在纸张里绝对定位 */
        }

        #scroll-paper.open {
            max-height: 400px; 
        }

        /* 🌟 新增：烟雾层特效 */
        #smoke-layer {
            position: absolute;
            top: -50px; left: -50px; right: -50px; bottom: -50px;
            /* 用径向渐变画出一团浓郁的白雾 */
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.9) 40%, rgba(255,255,255,0) 70%);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* 烟雾飘散的动画规则 */
        @keyframes clearSmoke {
            0% { opacity: 1; transform: scale(0.8) translateY(30px); filter: blur(5px); }
            40% { opacity: 1; transform: scale(1.2) translateY(0); filter: blur(10px); }
            100% { opacity: 0; transform: scale(1.6) translateY(-40px); filter: blur(20px); }
        }

        /* 当给烟雾加上 active 类时，播放烟雾飘散动画 */
        #smoke-layer.active {
            animation: clearSmoke 2s ease-in-out forwards;
        }

        /* 祝福文字的样式（修改为默认模糊、透明） */
        #blessing-text {
            font-size: 22px;
            color: #d33682;
            padding: 40px 20px;
            text-align: center;
            line-height: 1.6;
            font-weight: bold;
            position: relative;
            z-index: 2;
            
            /* 初始状态：完全透明且严重模糊 */
            opacity: 0;
            filter: blur(15px);
            transform: scale(0.9);
            /* 过渡动画：慢慢变得清晰、不透明、放大回正常比例 */
            transition: opacity 1.8s ease-out, filter 1.8s ease-out, transform 1.8s ease-out;
        }

        /* 当给文字加上 reveal 类时，文字浮现 */
        #blessing-text.reveal {
            opacity: 1;
            filter: blur(0);
            transform: scale(1);
        }

        /* 抽奖按钮样式 */
        button {
            padding: 15px 40px;
            font-size: 22px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0 #c92a2a;
            transition: all 0.1s;
            font-weight: bold;
        }

        button:active {
            box-shadow: 0 2px 0 #c92a2a;
            transform: translateY(4px);
        }

        /* 震动动画 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shaking {
            animation: shake 0.4s infinite;
        }
    </style>
</head>

        function startDraw() {

            // 更换随机背景
            const randomBg = backgroundColors[Math.floor(Math.random() * backgroundColors.length)];
            document.body.style.background = randomBg;

            // 收起卷轴，重置状态（清除烟雾动画和文字的清晰状态）
            paper.classList.remove("open");
            textEl.classList.remove("reveal");
            smokeEl.classList.remove("active");
            
            // 强制浏览器刷新一次状态，保证下次动画能正常触发
            void smokeEl.offsetWidth; 

            setTimeout(() => {
                // 卷轴开始震动
                container.classList.add("shaking");

                // 震动1秒后
                setTimeout(() => {

                    container.classList.remove("shaking");
                    
                    // 抽取文字并填入
                    const randomIndex = Math.floor(Math.random() * blessings.length);
                    textEl.innerText = blessings[randomIndex];

                    // 1. 卷轴展开
                    paper.classList.add("open");
                    // 2. 烟雾开始喷发飘散
                    smokeEl.classList.add("active");

                    setTimeout(() => {
                        textEl.classList.add("reveal");
                        
                        // 按钮恢复可用状态
                        btn.disabled = false;
                        btn.innerText = "再来一次！";
                    }, 300);

                }, 1000); 

            }, 300);
        }
